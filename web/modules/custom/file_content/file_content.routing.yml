file_content.example:
  path: '/file-content/example'
  defaults:
    _title: 'Example'
    _controller: '\Drupal\file_content\Controller\FileContentController::build'
  requirements:
    _permission: 'access content'

file_content.settings_form:
  path: '/admin/config/system/file-content'
  defaults:
    _title: 'file content settings'
    _form: 'Drupal\file_content\Form\SettingsForm'
  requirements:
    _permission: 'administer file_content configuration'
