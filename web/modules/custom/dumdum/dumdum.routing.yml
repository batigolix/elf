dumdum.example:
  path: '/dumdum/example'
  defaults:
    _title: 'Example'
    _controller: '\Drupal\dumdum\Controller\DumdumController::build'
  requirements:
    _permission: 'access content'

dumdum.settings_form:
  path: '/admin/config/system/dumdum'
  defaults:
    _title: 'dumdum settings'
    _form: 'Drupal\dumdum\Form\SettingsForm'
  requirements:
    _permission: 'administer dumdum configuration'
